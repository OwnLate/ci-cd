# Example .github/workflows/ci.yml for a project repository
# Replace PROJECT variable value with your actual project name

name: CI/CD

on:
  push:
    branches: [master, stage]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: core

jobs:
  # ────────────────────────────── PROD ──────────────────────────────
  build_prod:
    if: github.ref_name == 'master'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-build.yml@master
    with:
      deploy_env: prod
    secrets: inherit

  lint_prod:
    needs: [build_prod]
    if: github.ref_name == 'master'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-lint.yml@master
    with:
      deploy_env: prod
    secrets: inherit

  deploy_prod:
    needs: [build_prod]
    if: github.ref_name == 'master'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-deploy.yml@master
    with:
      deploy_env: prod
      environment_name: production/prod1
      environment_url: https://api.globalart.dev/swagger/
    secrets:
      HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      KUBECTX: ${{ secrets.KUBECTX_PROD1 }}

  cleanup_prod:
    needs: [deploy_prod]
    if: github.ref_name == 'master'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-cleanup.yml@master
    with:
      deploy_env: prod
    secrets:
      HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      KUBECTX: ${{ secrets.KUBECTX_PROD1 }}

  # ────────────────────────────── STAGE ─────────────────────────────
  build_stage:
    if: github.ref_name == 'stage'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-build.yml@master
    with:
      deploy_env: stage
    secrets: inherit

  lint_stage:
    needs: [build_stage]
    if: github.ref_name == 'stage'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-lint.yml@master
    with:
      deploy_env: stage
    secrets: inherit

  deploy_stage:
    needs: [build_stage]
    if: github.ref_name == 'stage'
    # Make deploy manual: enable "Required reviewers" on the staging environment in repository settings
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-deploy.yml@master
    with:
      deploy_env: stage
      environment_name: staging
      environment_url: https://api.glbart.dev/swagger/
    secrets:
      HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      KUBECTX: ${{ secrets.KUBECTX_STAGE1 }}

  cleanup_stage:
    needs: [deploy_stage]
    if: github.ref_name == 'stage'
    uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-cleanup.yml@master
    with:
      deploy_env: stage
    secrets:
      HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      KUBECTX: ${{ secrets.KUBECTX_STAGE1 }}

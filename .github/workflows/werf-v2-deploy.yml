# Reusable workflow — equivalent of werf/v2/deploy.gitlab-ci.yml
# Usage in a project repository:
#
#   jobs:
#     deploy_prod:
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-deploy.yml@master
#       with:
#         deploy_env: prod
#         environment_name: production/prod1
#         environment_url: https://api.globalart.dev/swagger/
#       secrets: inherit
#
#     deploy_stage:
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-deploy.yml@master
#       with:
#         deploy_env: stage
#         environment_name: staging
#         environment_url: https://api.glbart.dev/swagger/
#       secrets: inherit

on:
  workflow_call:
    inputs:
      deploy_env:
        required: true
        type: string
        description: "Target environment: prod or stage"
      environment_name:
        required: true
        type: string
        description: "GitHub Environment name (e.g. production/prod1 or staging)"
      environment_url:
        required: false
        type: string
        description: "Environment URL shown in GitHub Deployments"
      repo_name:
        required: false
        type: string
        description: "Repository name in Harbor (defaults to the GitHub repository name)"
      custom_tag:
        required: false
        type: string
        description: "Custom image tag (default: %image%-<run_id>)"
      namespace:
        required: false
        type: string
        description: "Kubernetes namespace prefix (resulting namespace: <namespace>-<env>)"
      appname:
        required: false
        type: string
        description: "Application name (WERF_SET_APPNAME)"
      werf_config_name:
        required: false
        type: string
        default: ""
        description: "Suffix for werf.yaml"
      project_name:
        required: false
        type: string
        default: ""
        description: "Override .project value in werf.yaml (e.g. platform-front-admin)"


    secrets:
      HARBOR_HOST:
        required: true
      HARBOR_USERNAME:
        required: true
      HARBOR_PASSWORD:
        required: true
      WERF_SECRET_KEY:
        required: false
      KUBECTX_PROD1:
        required: false
      KUBECTX_STAGE1:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.environment_url }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup werf
        uses: werf/actions/install@v2
        with:
          channel: ea

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          KUBECTX="${{ secrets.KUBECTX_PROD1 }}"
          if [[ "${{ inputs.deploy_env }}" == "stage" ]]; then KUBECTX="${{ secrets.KUBECTX_STAGE1 }}"; fi
          echo "$KUBECTX" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy
        env:
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          WERF_SECRET_KEY: ${{ secrets.WERF_SECRET_KEY }}
          WERF_CONFIG_NAME: ${{ inputs.werf_config_name }}
          NAMESPACE: ${{ inputs.namespace }}
          APPNAME: ${{ inputs.appname }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          HARBOR_PROJECT="$DEPLOY_ENV"

          REPO_NAME="${{ inputs.repo_name }}"
          if [[ -z "$REPO_NAME" ]]; then REPO_NAME="${GITHUB_REPOSITORY##*/}"; fi

          CUSTOM_TAG="${{ inputs.custom_tag }}"
          if [[ -z "$CUSTOM_TAG" ]]; then CUSTOM_TAG="%image%-${GITHUB_RUN_ID}"; fi

          ENVNAME="$DEPLOY_ENV"
          WERF_NAMESPACE=""
          if [[ -n "$NAMESPACE" ]]; then WERF_NAMESPACE="${NAMESPACE}-${ENVNAME}"; fi

          if [[ -n "$PROJECT_NAME" ]]; then
            sed -i "s/set . \"project\" \"[^\"]*\"/set . \"project\" \"${PROJECT_NAME}\"/g" werf.yaml
          fi

          if [[ -f ./.helm/def.sh ]]; then source ./.helm/def.sh && $DEPLOY_ENV; fi

          if [ -e ".helm/values-${ENVNAME}.yaml" ]; then
            export WERF_VALUES_COMMON=".helm/values-${ENVNAME}.yaml"
          fi
          if [ -e ".helm/secrets-${ENVNAME}.yaml" ]; then
            export WERF_SECRET_VALUES_COMMON=".helm/secrets-${ENVNAME}.yaml"
          fi

          export WERF_ENV="$DEPLOY_ENV"
          export WERF_CONFIG="werf${WERF_CONFIG_NAME}.yaml"
          export WERF_SYNCHRONIZATION=:local
          export WERF_REQUIRE_BUILT_IMAGES=true
          export WERF_INSECURE_REGISTRY=true
          export WERF_SKIP_TLS_VERIFY_REGISTRY=true
          export WERF_PARALLEL=false
          export WERF_ATOMIC=true
          export WERF_REPO="$HARBOR_HOST/$HARBOR_PROJECT/$REPO_NAME"
          export WERF_REPO_CONTAINER_REGISTRY=harbor
          export WERF_FINAL_REPO_HARBOR_PASSWORD="$HARBOR_USERNAME"
          export WERF_FINAL_REPO_HARBOR_USERNAME="$HARBOR_PASSWORD"
          export WERF_USE_CUSTOM_TAG="$CUSTOM_TAG"
          export WERF_LOOSE_GITERMINISM=true
          if [[ -n "$WERF_NAMESPACE" ]]; then export WERF_NAMESPACE; fi
          WERF_SET_APPNAME="$APPNAME"

          werf cr login -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD" "$HARBOR_HOST"
          werf converge

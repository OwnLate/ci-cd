# Reusable workflow — equivalent of werf/v2/dismiss.gitlab-ci.yml
# Usage in a project repository:
#
#   jobs:
#     dismiss_stage:
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-dismiss.yml@master
#       with:
#         deploy_env: stage
#       secrets: inherit

on:
  workflow_call:
    inputs:
      deploy_env:
        required: true
        type: string
        description: "Target environment: prod or stage"
      werf_config_name:
        required: false
        type: string
        default: ""
        description: "Suffix for werf.yaml"
    secrets:
      KUBECTX:
        required: true
        description: "Base64-encoded kubeconfig (KUBECTX_PROD1 or KUBECTX_STAGE1)"

jobs:
  dismiss:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup werf
        uses: werf/actions/install@v2
        with:
          channel: ea

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECTX }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Dismiss release
        env:
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          WERF_CONFIG_NAME: ${{ inputs.werf_config_name }}
        run: |
          if [[ -f ./.helm/def.sh ]]; then source ./.helm/def.sh && $DEPLOY_ENV; fi

          export WERF_ENV="$DEPLOY_ENV"
          export WERF_CONFIG="werf${WERF_CONFIG_NAME}.yaml"
          export WERF_LOOSE_GITERMINISM=true

          werf dismiss

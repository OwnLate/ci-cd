# Reusable workflow — equivalent of werf/v2/cleanup.gitlab-ci.yml
# Usage in a project repository:
#
#   jobs:
#     cleanup_prod:
#       needs: [deploy_prod]
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-cleanup.yml@master
#       with:
#         deploy_env: prod
#       secrets: inherit
#
#     cleanup_stage:
#       needs: [deploy_stage]
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-cleanup.yml@master
#       with:
#         deploy_env: stage
#       secrets: inherit

on:
  workflow_call:
    inputs:
      deploy_env:
        required: true
        type: string
        description: "Target environment: prod or stage"
      repo_name:
        required: false
        type: string
        description: "Repository name in Harbor (defaults to the GitHub repository name)"


    secrets:
      HARBOR_HOST:
        required: true
      HARBOR_USERNAME:
        required: true
      HARBOR_PASSWORD:
        required: true
      KUBECTX_PROD1:
        required: false
      KUBECTX_STAGE1:
        required: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup werf
        uses: werf/actions/install@v2
        with:
          channel: ea

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          KUBECTX="${{ secrets.KUBECTX_PROD1 }}"
          if [[ "${{ inputs.deploy_env }}" == "stage" ]]; then KUBECTX="${{ secrets.KUBECTX_STAGE1 }}"; fi
          echo "$KUBECTX" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Cleanup registry
        env:
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          HARBOR_PROJECT="$DEPLOY_ENV"

          REPO_NAME="${{ inputs.repo_name }}"
          if [[ -z "$REPO_NAME" ]]; then REPO_NAME="${GITHUB_REPOSITORY##*/}"; fi

          if [[ -f ./.helm/def.sh ]]; then source ./.helm/def.sh && $DEPLOY_ENV; fi

          export WERF_REPO="$HARBOR_HOST/$HARBOR_PROJECT/$REPO_NAME"

          werf cr login -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD" "$HARBOR_HOST"
          werf cleanup --repo "$WERF_REPO"
